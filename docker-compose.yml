version: '3.8'

services:
  # Web Scraper AI API
  web-scraper:
    build: .
    container_name: web-scraper-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./scraper.db
      - REDIS_URL=redis://redis:6379
      - CELERY_BROKER_URL=redis://redis:6379
      - CELERY_RESULT_BACKEND=redis://redis:6379
      - LOG_LEVEL=INFO
      - ENVIRONMENT=production
    volumes:
      - ./logs:/app/logs
      - ./exports:/app/exports
      - ./uploads:/app/uploads
      - ./static:/app/static
    depends_on:
      - redis
      - postgres
    restart: unless-stopped
    networks:
      - web-scraper-network

  # Redis for caching and task queue
  redis:
    image: redis:7-alpine
    container_name: web-scraper-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - web-scraper-network

  # PostgreSQL database (alternative to SQLite)
  postgres:
    image: postgres:15-alpine
    container_name: web-scraper-db
    environment:
      - POSTGRES_DB=web_scraper
      - POSTGRES_USER=scraper_user
      - POSTGRES_PASSWORD=scraper_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - web-scraper-network

  # Celery Worker
  celery-worker:
    build: .
    container_name: web-scraper-worker
    command: celery -A tasks worker --loglevel=info --concurrency=4
    environment:
      - DATABASE_URL=sqlite:///./scraper.db
      - REDIS_URL=redis://redis:6379
      - CELERY_BROKER_URL=redis://redis:6379
      - CELERY_RESULT_BACKEND=redis://redis:6379
      - LOG_LEVEL=INFO
      - ENVIRONMENT=production
    volumes:
      - ./logs:/app/logs
      - ./exports:/app/exports
    depends_on:
      - redis
      - postgres
    restart: unless-stopped
    networks:
      - web-scraper-network

  # Celery Beat Scheduler
  celery-beat:
    build: .
    container_name: web-scraper-beat
    command: celery -A tasks beat --loglevel=info
    environment:
      - DATABASE_URL=sqlite:///./scraper.db
      - REDIS_URL=redis://redis:6379
      - CELERY_BROKER_URL=redis://redis:6379
      - CELERY_RESULT_BACKEND=redis://redis:6379
      - LOG_LEVEL=INFO
      - ENVIRONMENT=production
    volumes:
      - ./logs:/app/logs
    depends_on:
      - redis
      - postgres
    restart: unless-stopped
    networks:
      - web-scraper-network

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: web-scraper-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
      - ./static:/app/static
    depends_on:
      - web-scraper
    restart: unless-stopped
    networks:
      - web-scraper-network

  # Monitoring with Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: web-scraper-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    networks:
      - web-scraper-network

  # Grafana dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: web-scraper-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    restart: unless-stopped
    networks:
      - web-scraper-network

volumes:
  redis_data:
  postgres_data:
  prometheus_data:
  grafana_data:

networks:
  web-scraper-network:
    driver: bridge
